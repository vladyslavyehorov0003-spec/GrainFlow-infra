services:

  # ── Infrastructure ────────────────────────────────────────────────────────

  # NOTE: No postgres here — database runs on AWS RDS (external)

  kafka:
    image: confluentinc/cp-kafka:7.6.1
    hostname: kafka
    container_name: grainflow-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - grainflow-network
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server kafka:29092 > /dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 5

  # ── Backend services ──────────────────────────────────────────────────────

  auth-service:
    image: ${ECR_REGISTRY}/auth-service:${IMAGE_TAG:-latest}
    container_name: grainflow-auth
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${AUTH_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      JWT_SECRET: ${JWT_SECRET}
      MAIL_PASSWORD: ${MAIL_PASSWORD}
      MAIL_USERNAME: ${MAIL_USERNAME}
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - grainflow-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  warehouse-service:
    image: ${ECR_REGISTRY}/warehouse-service:${IMAGE_TAG:-latest}
    container_name: grainflow-warehouse
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${WAREHOUSE_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - grainflow-network

  payment-service:
    image: ${ECR_REGISTRY}/payment-service:${IMAGE_TAG:-latest}
    container_name: grainflow-payment
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      DB_URL: ${PAYMENT_DB_URL}
      DB_USERNAME: ${DB_USERNAME}
      DB_PASSWORD: ${DB_PASSWORD}
      AUTH_SERVICE_URL: http://auth-service:8081
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET}
      STRIPE_PRICE_ID: ${STRIPE_PRICE_ID}
      FRONTEND_URL: ${FRONTEND_URL}
    ports:
      - "8083:8083"
    depends_on:
      kafka:
        condition: service_healthy
      auth-service:
        condition: service_healthy
    networks:
      - grainflow-network
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8083/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5

  api-gateway:
    image: ${ECR_REGISTRY}/api-gateway:${IMAGE_TAG:-latest}
    container_name: grainflow-gateway
    restart: unless-stopped
    environment:
      SPRING_PROFILES_ACTIVE: prod
      AUTH_SERVICE_URL: http://auth-service:8081
      WAREHOUSE_SERVICE_URL: http://warehouse-service:8082
      PAYMENT_SERVICE_URL: http://payment-service:8083
    ports:
      - "8080:8080"
    depends_on:
      auth-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
    networks:
      - grainflow-network

volumes:
  kafka_data:

networks:
  grainflow-network:
    driver: bridge
